services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: eulesia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # API Server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api.prod
    container_name: eulesia-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      COOKIE_DOMAIN: ${DOMAIN}
      APP_URL: https://${DOMAIN}
      API_URL: https://api.${DOMAIN}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-auth@${DOMAIN}}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      ALLOWED_ORIGINS: capacitor://localhost,https://localhost
      UPLOAD_DIR: /app/uploads
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      FIREBASE_SERVICE_ACCOUNT_KEY: ${FIREBASE_SERVICE_ACCOUNT_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wp_web"
      # HTTPS router
      - "traefik.http.routers.eulesia-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.eulesia-api.entrypoints=websecure"
      - "traefik.http.routers.eulesia-api.tls.certresolver=le"
      - "traefik.http.routers.eulesia-api.service=eulesia-api"
      # HTTP router (for ACME challenge and redirect)
      - "traefik.http.routers.eulesia-api-http.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.eulesia-api-http.entrypoints=web"
      - "traefik.http.routers.eulesia-api-http.service=eulesia-api"
      # Service
      - "traefik.http.services.eulesia-api.loadbalancer.server.port=3001"
      # OG meta tags: route bot requests on main domain to API for OG-enabled paths
      - "traefik.http.routers.eulesia-og.rule=Host(`${DOMAIN}`) && HeadersRegexp(`User-Agent`, `(?i)(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|WhatsApp|Slackbot|Discordbot|TelegramBot|Embedly|Pinterest|vkShare|Applebot|Googlebot|bingbot|Baiduspider|YandexBot|DuckDuckBot)`) && (PathPrefix(`/agora`) || PathPrefix(`/clubs/`) || PathPrefix(`/kunnat/`) || PathPrefix(`/user/`) || PathPrefix(`/aiheet`))"
      # Sitemap: route to API for dynamic generation
      - "traefik.http.routers.eulesia-sitemap.rule=Host(`${DOMAIN}`) && Path(`/sitemap.xml`)"
      - "traefik.http.routers.eulesia-sitemap.entrypoints=websecure"
      - "traefik.http.routers.eulesia-sitemap.tls.certresolver=le"
      - "traefik.http.routers.eulesia-sitemap.service=eulesia-api"
      - "traefik.http.routers.eulesia-sitemap.priority=200"
      - "traefik.http.routers.eulesia-og.entrypoints=websecure"
      - "traefik.http.routers.eulesia-og.tls.certresolver=le"
      - "traefik.http.routers.eulesia-og.service=eulesia-api"
      - "traefik.http.routers.eulesia-og.priority=200"
    networks:
      - internal
      - wp_web

  # Meilisearch (search engine)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: eulesia-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Frontend (static files served by nginx)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web.prod
      args:
        VITE_API_URL: https://api.${DOMAIN}
    container_name: eulesia-web
    restart: unless-stopped
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      # HTTPS router (accepts both naked and www)
      - "traefik.http.routers.eulesia-web.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.eulesia-web.entrypoints=websecure"
      - "traefik.http.routers.eulesia-web.tls.certresolver=le"
      - "traefik.http.routers.eulesia-web.service=eulesia-web"
      # www → naked redirect middleware
      - "traefik.http.middlewares.eulesia-www-redirect.redirectregex.regex=^https?://www\\.(.+)"
      - "traefik.http.middlewares.eulesia-www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.eulesia-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.eulesia-web.middlewares=eulesia-www-redirect"
      # HTTP router (for ACME challenge and redirect)
      - "traefik.http.routers.eulesia-web-http.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.eulesia-web-http.entrypoints=web"
      - "traefik.http.routers.eulesia-web-http.service=eulesia-web"
      # Service
      - "traefik.http.services.eulesia-web.loadbalancer.server.port=80"
    networks:
      - wp_web

volumes:
  postgres_data:
  meili_data:
  uploads_data:

networks:
  internal:
    name: eulesia-internal
  wp_web:
    external: true
