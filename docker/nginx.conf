# Bot user-agent detection for OG meta tag injection
map $http_user_agent $is_bot {
    default                     0;
    ~*facebookexternalhit       1;
    ~*Facebot                   1;
    ~*Twitterbot                1;
    ~*LinkedInBot               1;
    ~*WhatsApp                  1;
    ~*Slackbot                  1;
    ~*Discordbot                1;
    ~*TelegramBot               1;
    ~*Embedly                   1;
    ~*Pinterest                 1;
    ~*vkShare                   1;
    ~*Applebot                  1;
    ~*bot                       1;
    ~*crawler                   1;
    ~*spider                    1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # OG-enabled routes: proxy bots to API, serve SPA to users
    # Using rewrite + internal location to avoid Nginx "if + proxy_pass" issue
    location ~ ^/(agora/thread|agora/tag|clubs|kunnat|user)/ {
        if ($is_bot = 1) {
            rewrite ^(.*)$ /og-proxy$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Internal location for OG proxy to API
    location /og-proxy/ {
        internal;
        rewrite ^/og-proxy/(.*)$ /$1 break;
        proxy_pass http://eulesia-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
