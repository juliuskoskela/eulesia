version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: eulesia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eulesia
      POSTGRES_PASSWORD: eulesia_dev_password
      POSTGRES_DB: eulesia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eulesia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch (search engine)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: eulesia-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: development-meili-key-change-in-prod
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server (development)
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: eulesia-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://eulesia:eulesia_dev_password@db:5432/eulesia
      SCRAPER_DATABASE_URL: postgresql://eulesia:eulesia_dev_password@db:5432/eulesia_scraper
      SESSION_SECRET: development-secret-key-change-in-production-32chars
      APP_URL: http://localhost:5173
      API_URL: http://localhost:3001
      EMAIL_PROVIDER: console
      EMAIL_FROM: auth@eulesia.local
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: development-meili-key-change-in-prod
    ports:
      - "3001:3001"
    volumes:
      - ../apps/api/src:/app/apps/api/src:ro
    command: npm run dev --workspace=@eulesia/api

  # Frontend (development)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: eulesia-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ../src:/app/src:ro
      - ../public:/app/public:ro
    command: npm run dev -- --host

volumes:
  postgres_data:
  meili_data:

networks:
  default:
    name: eulesia-network
