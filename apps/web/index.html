    <meta

      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Eulesia</title>
    <meta
      name="description"
      content="Eurooppalainen kansalaisdemokratia-alusta"
    />
    <meta property="og:title" content="Eulesia" />
    <meta
      property="og:description"
      content="Eurooppalainen kansalaisdemokratia-alusta"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Eulesia" />
    <meta property="og:image" content="/og-default.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Eulesia" />
    <meta
      name="twitter:description"
      content="Eurooppalainen kansalaisdemokratia-alusta"
    />
    <link rel="canonical" href="https://eulesia.org/" />
    <link rel="alternate" hreflang="fi" href="https://eulesia.org/" />
    <link rel="alternate" hreflang="en" href="https://eulesia.org/" />
    <link rel="alternate" hreflang="x-default" href="https://eulesia.org/" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (!("serviceWorker" in navigator)) return;

        const legacyCachePrefixes = ["workbox-", "eulesia-"];

        window.addEventListener("load", () => {
          navigator.serviceWorker
            .getRegistrations()
            .then((registrations) =>
              Promise.all(
                registrations.map((registration) => {
                  const scriptUrls = [
                    registration.active?.scriptURL,
                    registration.installing?.scriptURL,
                    registration.waiting?.scriptURL,
                  ].filter(Boolean);

                  const hasLegacyWorker = scriptUrls.some((scriptUrl) => {
                    try {
                      return new URL(scriptUrl).pathname === "/sw.js";
                    } catch {
                      return String(scriptUrl).endsWith("/sw.js");
                    }
                  });

                  return hasLegacyWorker
                    ? registration.unregister()
                    : Promise.resolve(false);
                }),
              ),
            )
            .catch(() => {});

          if (!("caches" in window)) return;

          caches
            .keys()
            .then((cacheNames) =>
              Promise.all(
                cacheNames
                  .filter((cacheName) =>
                    legacyCachePrefixes.some((prefix) =>
                      cacheName.startsWith(prefix),
                    ),
                  )
                  .map((cacheName) => caches.delete(cacheName)),
              ),
            )
            .catch(() => {});
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
