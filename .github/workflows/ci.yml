name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ATTIC_ENDPOINT: http://localhost:8088

jobs:
  format-check:
    name: Format Check
    runs-on: [self-hosted, nix, mercury, eulesia]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Attic cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_AUTH_TOKEN }}
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE_NAME }}
          ATTIC_PUBKEY: ${{ secrets.ATTIC_PUBLIC_KEY }}
        run: |
          if [ -z "$ATTIC_TOKEN" ]; then
            echo "Attic secrets not configured, skipping cache"
            exit 0
          fi
          if ! command -v attic &> /dev/null; then
            nix profile install github:zhaofengli/attic
          fi
          attic login mercury "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          attic use "$ATTIC_CACHE"
          mkdir -p ~/.config/nix
          cat >> ~/.config/nix/nix.conf << EOF
          substituters = https://cache.nixos.org ${ATTIC_ENDPOINT}/${ATTIC_CACHE}
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= ${ATTIC_PUBKEY}
          EOF

      - name: Check formatting
        run: nix fmt -- --fail-on-change .

  flake-check:
    name: Flake Check
    runs-on: [self-hosted, nix, mercury, eulesia]
    needs: [format-check]
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Attic cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_AUTH_TOKEN }}
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE_NAME }}
          ATTIC_PUBKEY: ${{ secrets.ATTIC_PUBLIC_KEY }}
        run: |
          if [ -z "$ATTIC_TOKEN" ]; then
            echo "Attic secrets not configured, skipping cache"
            exit 0
          fi
          if ! command -v attic &> /dev/null; then
            nix profile install github:zhaofengli/attic
          fi
          attic login mercury "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          attic use "$ATTIC_CACHE"
          mkdir -p ~/.config/nix
          cat >> ~/.config/nix/nix.conf << EOF
          substituters = https://cache.nixos.org ${ATTIC_ENDPOINT}/${ATTIC_CACHE}
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= ${ATTIC_PUBKEY}
          EOF

      - name: Run flake checks
        id: checks
        run: |
          set +e
          BUILD_START=$(date +%s)

          if nix flake check --print-build-logs 2>&1 | tee check.log; then
            CHECK_STATUS="success"
          else
            CHECK_STATUS="failure"
          fi

          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))

          CACHE_HITS=$(grep -c "copying path.*from" check.log || true)
          BUILDS_FROM_SOURCE=$(grep -c "building " check.log || true)

          echo "check_duration=${BUILD_DURATION}" >> "$GITHUB_OUTPUT"
          echo "cache_hits=${CACHE_HITS}" >> "$GITHUB_OUTPUT"
          echo "builds_from_source=${BUILDS_FROM_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "check_status=${CHECK_STATUS}" >> "$GITHUB_OUTPUT"

          if [ "$CHECK_STATUS" = "failure" ]; then
            exit 1
          fi

      - name: Push to Attic cache
        if: success()
        env:
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE_NAME }}
        run: |
          if [ -z "$ATTIC_CACHE" ]; then exit 0; fi
          for result in result*; do
            if [ -L "$result" ]; then
              attic push "$ATTIC_CACHE" "./$result" || true
            fi
          done

      - name: Generate check summary
        if: always()
        run: |
          TOTAL_DEPS=$((${{ steps.checks.outputs.cache_hits }} + ${{ steps.checks.outputs.builds_from_source }}))
          if [ $TOTAL_DEPS -gt 0 ]; then
            CACHE_HIT_RATE=$(awk "BEGIN {printf \"%.1f\", (${{ steps.checks.outputs.cache_hits }} / $TOTAL_DEPS) * 100}")
          else
            CACHE_HIT_RATE="N/A"
          fi

          echo "## Flake Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.checks.outputs.check_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.checks.outputs.check_duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Cache Hit Rate:** ${CACHE_HIT_RATE}% (${{ steps.checks.outputs.cache_hits }}/$TOTAL_DEPS)" >> $GITHUB_STEP_SUMMARY
          echo "- **Built from Source:** ${{ steps.checks.outputs.builds_from_source }}" >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    name: E2E Tests
    runs-on: [self-hosted, nix, mercury, eulesia]
    needs: [flake-check]
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run E2E tests
        run: |
          nix develop .#ci --command bash -c '
            set -euo pipefail

            export EULESIA_DEV_STATE_DIR="$(mktemp -d)"
            export EULESIA_PGDATA_DIR="$EULESIA_DEV_STATE_DIR/postgres"
            export EULESIA_PGPORT=5433
            export EULESIA_DB_USER=eulesia
            export EULESIA_DB_NAME=eulesia_e2e
            export EULESIA_MEILI_PORT=7701
            export EULESIA_MEILI_URL="http://127.0.0.1:$EULESIA_MEILI_PORT"
            export EULESIA_MEILI_MASTER_KEY="e2e-meili-key"
            export EULESIA_MEILI_DATA_DIR="$EULESIA_DEV_STATE_DIR/meilisearch"
            export DATABASE_URL="postgresql://$EULESIA_DB_USER:eulesia@127.0.0.1:$EULESIA_PGPORT/$EULESIA_DB_NAME"
            export MEILI_URL="$EULESIA_MEILI_URL"
            export MEILI_MASTER_KEY="$EULESIA_MEILI_MASTER_KEY"
            export PORT=3002
            export APP_URL="http://localhost:5174"
            export API_URL="http://localhost:$PORT"
            export VITE_API_URL="$API_URL"
            export SESSION_SECRET="e2e-test-secret-key-must-be-32chars"
            export ALLOWED_ORIGINS="http://localhost:5174"
            export UPLOAD_DIR="$EULESIA_DEV_STATE_DIR/uploads"
            export NODE_ENV=development
            export CI=true
            export PLAYWRIGHT_BASE_URL="http://localhost:5174"
            export PLAYWRIGHT_API_URL="$API_URL"

            # Ensure all PG clients default to the right connection
            export PGHOST=127.0.0.1
            export PGPORT="$EULESIA_PGPORT"
            export PGUSER="$EULESIA_DB_USER"
            export PGDATABASE="$EULESIA_DB_NAME"

            mkdir -p "$EULESIA_DEV_STATE_DIR" "$UPLOAD_DIR" "$EULESIA_MEILI_DATA_DIR"

            PG_PID=""
            MEILI_PID=""
            API_PID=""
            WEB_PID=""

            cleanup() {
              for pid in $WEB_PID $API_PID $MEILI_PID $PG_PID; do
                [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
              done
              for pid in $WEB_PID $API_PID $MEILI_PID $PG_PID; do
                [ -n "$pid" ] && wait "$pid" 2>/dev/null || true
              done
              rm -rf "$EULESIA_DEV_STATE_DIR"
            }
            trap cleanup EXIT

            # Bootstrap PostgreSQL
            initdb --username="$EULESIA_DB_USER" --auth-local=trust --auth-host=trust --pgdata="$EULESIA_PGDATA_DIR" >/dev/null
            postgres -D "$EULESIA_PGDATA_DIR" -F -h 127.0.0.1 -p "$EULESIA_PGPORT" -k "$EULESIA_DEV_STATE_DIR" &
            PG_PID=$!

            for i in $(seq 1 30); do
              pg_isready -h 127.0.0.1 -p "$EULESIA_PGPORT" >/dev/null 2>&1 && break
              sleep 1
            done
            createdb -h 127.0.0.1 -p "$EULESIA_PGPORT" -U "$EULESIA_DB_USER" "$EULESIA_DB_NAME"

            # Start Meilisearch
            meilisearch --env development --http-addr "127.0.0.1:$EULESIA_MEILI_PORT" \
              --master-key "$EULESIA_MEILI_MASTER_KEY" --db-path "$EULESIA_MEILI_DATA_DIR" \
              --no-analytics &
            MEILI_PID=$!

            for i in $(seq 1 30); do
              curl -sf "$EULESIA_MEILI_URL/health" >/dev/null 2>&1 && break
              sleep 1
            done

            # Install deps and run migrations
            npm ci
            npx --workspace=@eulesia/api drizzle-kit push --force

            # Start API
            npm run dev --workspace=@eulesia/api &
            API_PID=$!

            for i in $(seq 1 30); do
              curl -sf "$API_URL/api/v1/health" >/dev/null 2>&1 && break
              sleep 1
            done

            # Start frontend on port 5174
            npx vite --port 5174 &
            WEB_PID=$!

            for i in $(seq 1 15); do
              curl -sf "http://localhost:5174" >/dev/null 2>&1 && break
              sleep 1
            done

            # Run Playwright
            npx playwright test --reporter=list,html
          '

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: .artifacts/playwright/
          retention-days: 14

  ci-success:
    name: CI Success
    needs: [format-check, flake-check, e2e-tests]
    runs-on: [self-hosted, nix, mercury, eulesia]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.format-check.result }}" != "success" ] || \
             [ "${{ needs.flake-check.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            echo "  format-check: ${{ needs.format-check.result }}"
            echo "  flake-check: ${{ needs.flake-check.result }}"
            echo "  e2e-tests: ${{ needs.e2e-tests.result }}"
            exit 1
          fi
          echo "All CI jobs passed successfully!"
