name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, nix, mercury, eulesia]
    timeout-minutes: 45
    env:
      EULESIA_PROD_TARGET_HOST: ${{ vars.EULESIA_PROD_TARGET_HOST }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Attic cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_AUTH_TOKEN }}
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE_NAME }}
          ATTIC_PUBKEY: ${{ secrets.ATTIC_PUBLIC_KEY }}
        run: |
          if [ -z "$ATTIC_TOKEN" ]; then
            echo "Attic secrets not configured, skipping cache"
            exit 0
          fi
          if ! command -v attic &> /dev/null; then
            nix profile install github:zhaofengli/attic
          fi
          attic login mercury http://localhost:8088 "$ATTIC_TOKEN"
          attic use "$ATTIC_CACHE"
          mkdir -p ~/.config/nix
          cat >> ~/.config/nix/nix.conf << EOF
          substituters = https://cache.nixos.org http://localhost:8088/${ATTIC_CACHE}
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= ${ATTIC_PUBKEY}
          EOF

      - name: Validate configuration
        run: |
          if [ -z "$EULESIA_PROD_TARGET_HOST" ]; then
            echo "::error::Missing repository variable EULESIA_PROD_TARGET_HOST"
            exit 1
          fi
          echo "Target: $EULESIA_PROD_TARGET_HOST"

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.EULESIA_DEPLOY_SSH_KEY }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          SSH_CONTROL_DIR="/tmp/eulesia-prod-ssh-${GITHUB_RUN_ID}-${GITHUB_JOB}"
          rm -rf "$SSH_CONTROL_DIR"
          install -d -m 700 "$SSH_CONTROL_DIR"
          echo "$DEPLOY_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          echo "EULESIA_SSH_CONTROL_DIR=$SSH_CONTROL_DIR" >> "$GITHUB_ENV"

          # Validate key
          ssh-keygen -l -f "$HOME/.ssh/id_ed25519" || { echo "::error::Invalid SSH key"; exit 1; }

          ssh-keyscan -T 15 -v -H -t ed25519,rsa "$EULESIA_PROD_TARGET_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          SSH_OPTS=(
            -i "$HOME/.ssh/id_ed25519"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=8
            -o TCPKeepAlive=yes
            -o ConnectTimeout=15
            -o ConnectionAttempts=5
            -o ControlMaster=auto
            -o ControlPersist=10m
            -o ControlPath="$SSH_CONTROL_DIR/%C"
          )

          ssh "${SSH_OPTS[@]}" root@"$EULESIA_PROD_TARGET_HOST" "echo 'SSH connection OK'"

      - name: Build production system
        run: nix build .#nixosConfigurations.eulesia-prod.config.system.build.toplevel

      - name: Deploy production system
        run: |
          SSH_OPTS=(
            -i "$HOME/.ssh/id_ed25519"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=8
            -o TCPKeepAlive=yes
            -o ConnectTimeout=15
            -o ConnectionAttempts=5
            -o ControlMaster=auto
            -o ControlPersist=10m
            -o ControlPath="$EULESIA_SSH_CONTROL_DIR/%C"
          )

          export NIX_SSHOPTS="${SSH_OPTS[*]}"
          ssh "${SSH_OPTS[@]}" root@"$EULESIA_PROD_TARGET_HOST" "echo 'Pre-deploy SSH OK'"
          nix run .#rebuild-prod

      - name: Health checks
        run: |
          SSH_OPTS=(
            -i "$HOME/.ssh/id_ed25519"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=8
            -o TCPKeepAlive=yes
            -o ConnectTimeout=15
            -o ConnectionAttempts=5
            -o ControlMaster=auto
            -o ControlPersist=10m
            -o ControlPath="$EULESIA_SSH_CONTROL_DIR/%C"
          )

          echo "Waiting for API to become healthy..."
          HEALTHY=false
          for i in $(seq 1 30); do
            if ssh "${SSH_OPTS[@]}" root@"$EULESIA_PROD_TARGET_HOST" \
              "curl -fsS http://127.0.0.1:3002/api/v1/health" 2>/dev/null; then
              HEALTHY=true
              break
            fi
            echo "Attempt $i/30 — not ready, waiting 5s..."
            sleep 5
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "::error::API failed to become healthy after 150s"
            exit 1
          fi

          echo "Verifying auth config..."
          ssh "${SSH_OPTS[@]}" root@"$EULESIA_PROD_TARGET_HOST" \
            "curl -fsS http://127.0.0.1:3002/api/v1/auth/config" \
            > /tmp/auth-config.json
          cat /tmp/auth-config.json
          jq -e '.success == true and .data.registrationMode == "ftn-open"' /tmp/auth-config.json >/dev/null
          echo "All health checks passed."

      - name: Data integrity checks
        run: |
          SSH_OPTS=(
            -i "$HOME/.ssh/id_ed25519"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=8
            -o TCPKeepAlive=yes
            -o ConnectTimeout=15
            -o ConnectionAttempts=5
            -o ControlMaster=auto
            -o ControlPersist=10m
            -o ControlPath="$EULESIA_SSH_CONTROL_DIR/%C"
          )

          EXPECTED_MIGRATIONS="$(find crates/db/src/migration -maxdepth 1 -name 'm[0-9]*.rs' | wc -l | tr -d ' ')"

          ssh "${SSH_OPTS[@]}" root@"$EULESIA_PROD_TARGET_HOST" \
            "EXPECTED_MIGRATIONS=$EXPECTED_MIGRATIONS bash -se" <<'REMOTE'
          set -euo pipefail

          PSQL="sudo -u postgres psql -X -A -t -v ON_ERROR_STOP=1"
          actual_migrations="$($PSQL -d eulesia_v2 -c 'SELECT COUNT(*) FROM seaql_migrations;')"

          echo "Expected migrations: $EXPECTED_MIGRATIONS"
          echo "Applied migrations: $actual_migrations"

          if [ "$actual_migrations" -ne "$EXPECTED_MIGRATIONS" ]; then
            echo "::error::Migration count mismatch on production host"
            exit 1
          fi

          users_v2="$($PSQL -d eulesia_v2 -c 'SELECT COUNT(*) FROM users;')"
          threads_v2="$($PSQL -d eulesia_v2 -c 'SELECT COUNT(*) FROM threads;')"
          clubs_v2="$($PSQL -d eulesia_v2 -c 'SELECT COUNT(*) FROM clubs;')"

          echo "v2 users: $users_v2"
          echo "v2 threads: $threads_v2"
          echo "v2 clubs: $clubs_v2"

          if [ "$users_v2" -eq 0 ] || [ "$threads_v2" -eq 0 ]; then
            echo "::error::v2 database is unexpectedly empty"
            exit 1
          fi

          legacy_db_present="$($PSQL -d postgres -c "SELECT COUNT(*) FROM pg_database WHERE datname = 'eulesia';")"
          if [ "$legacy_db_present" -eq 0 ]; then
            echo "Legacy database not present; skipping parity checks."
            exit 0
          fi

          old_users="$(mktemp)"
          new_users="$(mktemp)"
          old_clubs="$(mktemp)"
          new_clubs="$(mktemp)"
          trap 'rm -f "$old_users" "$new_users" "$old_clubs" "$new_clubs"' EXIT

          LC_ALL=C $PSQL -d eulesia -c 'SELECT username FROM users WHERE username IS NOT NULL ORDER BY username COLLATE "C"' > "$old_users"
          LC_ALL=C $PSQL -d eulesia_v2 -c 'SELECT username FROM users WHERE username IS NOT NULL ORDER BY username COLLATE "C"' > "$new_users"
          missing_usernames="$(comm -23 "$old_users" "$new_users" || true)"
          if [ -n "$missing_usernames" ]; then
            echo "::error::Legacy usernames missing from eulesia_v2"
            printf '%s\n' "$missing_usernames"
            exit 1
          fi

          LC_ALL=C $PSQL -d eulesia -c 'SELECT slug FROM clubs WHERE slug IS NOT NULL ORDER BY slug COLLATE "C"' > "$old_clubs"
          LC_ALL=C $PSQL -d eulesia_v2 -c 'SELECT slug FROM clubs WHERE slug IS NOT NULL ORDER BY slug COLLATE "C"' > "$new_clubs"
          missing_club_slugs="$(comm -23 "$old_clubs" "$new_clubs" || true)"
          if [ -n "$missing_club_slugs" ]; then
            echo "::error::Legacy club slugs missing from eulesia_v2"
            printf '%s\n' "$missing_club_slugs"
            exit 1
          fi

          legacy_public_members="$(mktemp)"
          v2_public_members="$(mktemp)"
          legacy_room_ids="$(mktemp)"
          v2_private_room_ids="$(mktemp)"
          legacy_room_members="$(mktemp)"
          v2_private_room_members="$(mktemp)"
          legacy_thread_ids="$(mktemp)"
          v2_thread_ids="$(mktemp)"
          legacy_comment_ids="$(mktemp)"
          v2_comment_ids="$(mktemp)"
          trap 'rm -f "$old_users" "$new_users" "$old_clubs" "$new_clubs" "$legacy_public_members" "$v2_public_members" "$legacy_room_ids" "$v2_private_room_ids" "$legacy_room_members" "$v2_private_room_members" "$legacy_thread_ids" "$v2_thread_ids" "$legacy_comment_ids" "$v2_comment_ids"' EXIT

          LC_ALL=C $PSQL -d eulesia -c '
            SELECT c.slug || E''\t'' || COUNT(cm.user_id)
            FROM clubs c
            LEFT JOIN club_members cm ON cm.club_id = c.id
            GROUP BY c.slug
            ORDER BY c.slug COLLATE "C"
          ' > "$legacy_public_members"
          LC_ALL=C $PSQL -d eulesia_v2 -c '
            SELECT c.slug || E''\t'' || COUNT(cm.user_id)
            FROM clubs c
            LEFT JOIN club_members cm ON cm.club_id = c.id
            WHERE c.is_public = TRUE
            GROUP BY c.slug
            ORDER BY c.slug COLLATE "C"
          ' > "$v2_public_members"
          if ! awk -F $'\t' '
            NR==FNR { v2[$1]=$2; next }
            {
              if (!($1 in v2) || v2[$1] < $2) {
                printf "%s\tlegacy=%s\tv2=%s\n", $1, $2, ($1 in v2 ? v2[$1] : "missing")
                failed=1
              }
            }
            END { exit failed ? 1 : 0 }
          ' "$v2_public_members" "$legacy_public_members"; then
            echo "::error::Legacy public club membership counts not satisfied in eulesia_v2"
            exit 1
          fi

          LC_ALL=C $PSQL -d eulesia -c 'SELECT id::text FROM rooms ORDER BY id::text COLLATE "C"' > "$legacy_room_ids"
          LC_ALL=C $PSQL -d eulesia_v2 -c 'SELECT id::text FROM clubs WHERE is_public = FALSE ORDER BY id::text COLLATE "C"' > "$v2_private_room_ids"
          missing_room_ids="$(comm -23 "$legacy_room_ids" "$v2_private_room_ids" || true)"
          if [ -n "$missing_room_ids" ]; then
            echo "::error::Legacy room ids missing from private clubs in eulesia_v2"
            printf '%s\n' "$missing_room_ids"
            exit 1
          fi

          LC_ALL=C $PSQL -d eulesia -c '
            SELECT r.id::text || E''\t'' || (1 + COUNT(rm.user_id))
            FROM rooms r
            LEFT JOIN room_members rm ON rm.room_id = r.id
            GROUP BY r.id
            ORDER BY r.id::text COLLATE "C"
          ' > "$legacy_room_members"
          LC_ALL=C $PSQL -d eulesia_v2 -c '
            SELECT c.id::text || E''\t'' || COUNT(cm.user_id)
            FROM clubs c
            LEFT JOIN club_members cm ON cm.club_id = c.id
            WHERE c.is_public = FALSE
            GROUP BY c.id
            ORDER BY c.id::text COLLATE "C"
          ' > "$v2_private_room_members"
          if ! awk -F $'\t' '
            NR==FNR { v2[$1]=$2; next }
            {
              if (!($1 in v2) || v2[$1] < $2) {
                printf "%s\tlegacy=%s\tv2=%s\n", $1, $2, ($1 in v2 ? v2[$1] : "missing")
                failed=1
              }
            }
            END { exit failed ? 1 : 0 }
          ' "$v2_private_room_members" "$legacy_room_members"; then
            echo "::error::Legacy room membership counts not satisfied in eulesia_v2"
            exit 1
          fi

          LC_ALL=C $PSQL -d eulesia -c '
            SELECT id
            FROM (
              SELECT id::text AS id FROM threads
              UNION
              SELECT id::text AS id FROM club_threads
              UNION
              SELECT id::text AS id FROM room_threads
            ) AS legacy_threads
            ORDER BY id COLLATE "C"
          ' > "$legacy_thread_ids"
          LC_ALL=C $PSQL -d eulesia_v2 -c 'SELECT id::text FROM threads ORDER BY id::text COLLATE "C"' > "$v2_thread_ids"
          missing_thread_ids="$(comm -23 "$legacy_thread_ids" "$v2_thread_ids" || true)"
          if [ -n "$missing_thread_ids" ]; then
            echo "::error::Legacy thread ids missing from eulesia_v2"
            printf '%s\n' "$missing_thread_ids"
            exit 1
          fi

          LC_ALL=C $PSQL -d eulesia -c '
            SELECT id
            FROM (
              SELECT id::text AS id FROM comments
              UNION
              SELECT id::text AS id FROM club_comments
              UNION
              SELECT id::text AS id FROM room_comments
            ) AS legacy_comments
            ORDER BY id COLLATE "C"
          ' > "$legacy_comment_ids"
          LC_ALL=C $PSQL -d eulesia_v2 -c 'SELECT id::text FROM comments ORDER BY id::text COLLATE "C"' > "$v2_comment_ids"
          missing_comment_ids="$(comm -23 "$legacy_comment_ids" "$v2_comment_ids" || true)"
          if [ -n "$missing_comment_ids" ]; then
            echo "::error::Legacy comment ids missing from eulesia_v2"
            printf '%s\n' "$missing_comment_ids"
            exit 1
          fi

          echo "Data integrity checks passed."
          REMOTE

      - name: Generate deploy summary
        if: always()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** $EULESIA_PROD_TARGET_HOST" >> $GITHUB_STEP_SUMMARY
